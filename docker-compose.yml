version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: acbr_user
      POSTGRES_PASSWORD: acbr_password
      POSTGRES_DB: acbr_nfe
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    restart: unless-stopped

  api:
    build: .
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    ports:
      - '8001:8000'
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
      - redis
    restart: unless-stopped
    command: sh -c "echo '🚀 Iniciando OpenManifest API...' && xvfb-run -a python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --app-dir /app"

volumes:
  postgres_data:
